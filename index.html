  function parseMatchDateTime(dateStr, timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const [y, mo, d] = dateStr.split("-").map(Number);
    return new Date(Date.UTC(y, mo-1, d, h-6, m));
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { d:0, h:0, m:0, s:0 };
    const totalSec = Math.floor(ms / 1000);
    return { d: Math.floor(totalSec / 86400), h: Math.floor((totalSec % 86400) / 3600), m: Math.floor((totalSec % 3600) / 60), s: totalSec % 60 };
  }

  function pad(n) { return String(n).padStart(2, "0"); }
  
  function formatTime12(timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const hour12 = h % 12 || 12;
    const ampm = h >= 12 ? "PM" : "AM";
    return { hour: hour12, minute: pad(m), ampm: ampm };
  }
  
  function formatDateHeader(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    return d.toLocaleDateString("bn-BD", { weekday:"short", month:"short", day:"numeric" }).toUpperCase();
  }

  let currentState = { now: new Date(), selectedStage: "Group Stage", showGroups: false };
  let intervalId = null;

  function setStage(stage) { currentState.selectedStage = stage; renderApp(); }
  function toggleGroups() { currentState.showGroups = !currentState.showGroups; renderApp(); }
  function getNextMatch(fixturesWithDT) { return fixturesWithDT.filter(f => f.dt > currentState.now).sort((a,b) => a.dt - b.dt)[0] || null; }

  function renderApp() {
    const root = document.getElementById("root");
    if (!root) return;
    const enriched = fixturesRaw.map(f => ({ ...f, dt: parseMatchDateTime(f.date, f.time) }));
    const nextMatch = getNextMatch(enriched);
    const cd = nextMatch ? formatCountdown(nextMatch.dt - currentState.now) : null;
    let stageMatches = fixturesRaw.filter(f => f.stage === currentState.selectedStage);
    const byDate = {};
    stageMatches.forEach(f => { byDate[f.date] = byDate[f.date] || []; byDate[f.date].push(f); });
    
    // গ্রুপ প্যানেল (বাংলায় গ্রুপের নাম)

          <div style="font-size: 12px; font-weight: bold; color: ${groupColors[gBn]}; margin-bottom: 6px;">গ্রুপ ${gBn}</div>
          ${teams.map(team => `<div class="group-team">${getFlag(team)} ${countryBn[team] || team}</div>`).join('')}
        </div>
      `).join('')}</div>`;
    }
    
    let fixturesHtml = "";
    if (Object.keys(byDate).length === 0) {
      fixturesHtml = `<div style="text-align:center; color:#2a4a6a; padding:40px 0;">🚫 কোন ম্যাচ পাওয়া যায়নি</div>`;
    } else {
      fixturesHtml = Object.entries(byDate).map(([date, matches]) => {
        const dateHeader = formatDateHeader(date);
        const matchesHtml = matches.map(m => {
          const mDT = parseMatchDateTime(m.date, m.time);
          const isPast = mDT < currentState.now;
          const isNextFlag = nextMatch && nextMatch.match === m.match && nextMatch.date === m.date && nextMatch.time === m.time;
          const groupBn = m.group ? groupNamesBn[m.group] : null;
          const groupCol = groupBn ? groupColors[groupBn] : (isNextFlag ? "#c5a028" : "#2a4a6a");
          let matchWithFlags = m.match;
          if (m.match && m.match.includes(" vs ") && !m.match.includes("বনাম")) {
            matchWithFlags = formatMatchWithBn(m.match);
          } else if (m.match && (m.match.includes("বনাম") || m.match.includes("ডাব্লিউ") || m.match.includes("আরইউ"))) {

          } else if (m.match && m.match.includes(" vs ")) {

        }).join('');
        return `<div style="margin-bottom: 28px;"><div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;"><div style="background: linear-gradient(135deg, #c5a028, #e6cf6e); color: #041226; font-weight: bold; font-size: 10px; padding: 4px 16px; border-radius: 40px;">${dateHeader}</div><div style="flex: 1; height: 1px; background: radial-gradient(circle, rgba(197,160,40,0.4), transparent);"></div></div>${matchesHtml}</div>`;

      <h1 style="font-size: clamp(16px, 5vw, 24px); margin: 4px 0; color: #fff; line-height: 1.2;">🇧🇩 সম্পূর্ণ সূচি — বাংলাদেশ সময়</h1>
      <div style="font-size: 9px; color: #2e5570;">সময় বিএসটি (ইউটিসি+৬) · ১০৪ ম্যাচ · ৪৮ দল</div>
      <button id="toggleGroupsBtn" class="group-tag-btn" style="margin-top: 12px;">📋 ${currentState.showGroups ? "▲ গ্রুপ লুকান" : "▼ সব গ্রুপ দেখুন"}</button>
      <div id="groupsPanel" style="margin-top: 8px;">${groupsPanelHtml}</div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px;">${stageListEn.map((s, idx) => `<button data-stage="${s}" class="stage-btn ${currentState.selectedStage === s ? 'active' : ''}">${stageListBn[idx]}</button>`).join('')}</div>
    </div>
    <div style="background: rgba(10,30,58,0.6); padding: 6px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; align-items: center;"><span style="font-size: 10px; font-weight: bold; color: #c5a028;">${stageListBn[stageListEn.indexOf(currentState.selectedStage)]}</span><span style="font-size: 10px; color: rgba(255,255,255,0.3);">— ${stageMatches.length} ম্যাচ</span></div>
    <div class="fixture-container">${fixturesHtml}</div>
    <div style="border-top: 1px solid rgba(197,160,40,0.1); padding: 20px; text-align: center; font-size: 9px; color: #1e3a54;">🇧🇩 বিএসটি (ইউটিসি+৬) · অফিসিয়াল ফিফা ২০২৬ সূচি · ৪৮ দল</div>
    </div>`;
    root.innerHTML = fullHtml;
    document.getElementById("toggleGroupsBtn")?.addEventListener("click", toggleGroups);
    document.querySelectorAll("[data-stage]").forEach(btn => btn.addEventListener("click", (e) => { const stage = btn.getAttribute("data-stage"); if(stage) setStage(stage); }));
  }
  
  function init() { renderApp(); intervalId = setInterval(() => { currentState.now = new Date(); renderApp(); }, 1000); }
  init();
</script>
</body>
</html>
