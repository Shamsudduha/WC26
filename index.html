  function parseMatchDateTime(dateStr, timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const [y, mo, d] = dateStr.split("-").map(Number);
    return new Date(Date.UTC(y, mo-1, d, h-6, m));
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { d:0, h:0, m:0, s:0 };
    const totalSec = Math.floor(ms / 1000);
    return { d: Math.floor(totalSec / 86400), h: Math.floor((totalSec % 86400) / 3600), m: Math.floor((totalSec % 3600) / 60), s: totalSec % 60 };
  }

  function pad(n) { return String(n).padStart(2, "0"); }
  
  function formatTime12(timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const hour12 = h % 12 || 12;
    const ampm = h >= 12 ? "PM" : "AM";
    return { hour: hour12, minute: pad(m), ampm: ampm };
  }
  
  function formatDateHeader(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    return d.toLocaleDateString("bn-BD", { weekday:"short", month:"short", day:"numeric" }).toUpperCase();
  }

  let currentState = { now: new Date(), selectedStage: "Group Stage", searchQuery: "", showGroups: false };
  let intervalId = null;

  function setStage(stage) { currentState.selectedStage = stage; currentState.searchQuery = ""; renderApp(); }
  function setSearchQuery(q) { currentState.searchQuery = q; renderApp(); }
  function toggleGroups() { currentState.showGroups = !currentState.showGroups; renderApp(); }
  function getNextMatch(fixturesWithDT) { return fixturesWithDT.filter(f => f.dt > currentState.now).sort((a,b) => a.dt - b.dt)[0] || null; }

  function renderApp() {
    const root = document.getElementById("root");
    if (!root) return;
    const enriched = fixturesRaw.map(f => ({ ...f, dt: parseMatchDateTime(f.date, f.time) }));
    const nextMatch = getNextMatch(enriched);
    const cd = nextMatch ? formatCountdown(nextMatch.dt - currentState.now) : null;
    let stageMatches = fixturesRaw.filter(f => f.stage === currentState.selectedStage);
    const searchLow = currentState.searchQuery.toLowerCase();
    if (searchLow) {
      stageMatches = stageMatches.filter(f => (f.match || "").toLowerCase().includes(searchLow) || (f.venue || "").toLowerCase().includes(searchLow) || (f.group || "").toLowerCase().includes(searchLow));
    }
    const byDate = {};
    stageMatches.forEach(f => { byDate[f.date] = byDate[f.date] || []; byDate[f.date].push(f); });
    
    let groupsPanelHtml = "";
    if (currentState.showGroups) {
      groupsPanelHtml = `<div class="groups-grid">${Object.entries(groupsList).map(([g, teams]) => `<div class="group-card" style="border-left: 3px solid ${groupColors[g]};"><div style="font-size: 12px; font-weight: bold; color: ${groupColors[g]}; margin-bottom: 6px;">গ্রুপ ${g}</div>${teams.map(team => `<div class="group-team">${getFlag(team)} ${team}</div>`).join('')}</div>`).join('')}</div>`;
    }
    
    let fixturesHtml = "";
    if (Object.keys(byDate).length === 0) {
      fixturesHtml = `<div style="text-align:center; color:#2a4a6a; padding:40px 0;">🚫 কোন ম্যাচ পাওয়া যায়নি${searchLow ? ` "${currentState.searchQuery}"` : ""}.</div>`;
    } else {
      fixturesHtml = Object.entries(byDate).map(([date, matches]) => {
        const dateHeader = formatDateHeader(date);
        const matchesHtml = matches.map(m => {
          const mDT = parseMatchDateTime(m.date, m.time);
          const isPast = mDT < currentState.now;
          const isNextFlag = nextMatch && nextMatch.match === m.match && nextMatch.date === m.date && nextMatch.time === m.time;
          const groupCol = m.group ? groupColors[m.group] : (isNextFlag ? "#c5a028" : "#2a4a6a");
          const matchWithFlags = m.match.includes(" vs ") ? addFlagsToMatch(m.match) : m.match;
          const timeObj = formatTime12(m.time);
          return `<div style="background: ${isNextFlag ? 'rgba(197,160,40,0.12)' : isPast ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.04)'}; border-left: 3px solid ${groupCol}; border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">${isNextFlag ? `<div style="position: absolute; top: -9px; right: 10px; background: #c5a028; color: #041226; font-size: 8px; font-weight: bold; padding: 2px 12px; border-radius: 40px;">পরবর্তী</div>` : ''}<div class="time-badge"><div><span class="time-hour">${timeObj.hour}:${timeObj.minute}</span><span class="time-ampm">${timeObj.ampm}</span></div><div class="time-label">বিএসটি</div></div>${m.group ? `<div style="width: 30px; height: 30px; border-radius: 50%; background: ${groupColors[m.group]}; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #fff;">${m.group}</div>` : `<div style="width: 30px;"></div>`}<div style="flex: 1; min-width: 150px;"><div style="font-size: 14px; font-weight: 600; color: ${isPast ? '#809cb0' : '#fdf6e3'}; line-height: 1.4;">${matchWithFlags}</div><div style="font-size: 10px; color: #6f8faa; margin-top: 5px;">📍 ${m.venue}</div></div>${isPast ? `<span style="font-size: 9px; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 25px;">সমাপ্ত</span>` : ''}</div>`;
        }).join('');
        return `<div style="margin-bottom: 28px;"><div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;"><div style="background: linear-gradient(135deg, #c5a028, #e6cf6e); color: #041226; font-weight: bold; font-size: 10px; padding: 4px 16px; border-radius: 40px;">${dateHeader}</div><div style="flex: 1; height: 1px; background: radial-gradient(circle, rgba(197,160,40,0.4), transparent);"></div></div>${matchesHtml}</div>`;
      }).join('');
    }
    
    const nextMatchFlagged = nextMatch ? (nextMatch.match.includes(" vs ") ? addFlagsToMatch(nextMatch.match) : nextMatch.match) : "";
    const timeObjNext = nextMatch ? formatTime12(nextMatch.time) : null;
    const countdownHtml = nextMatch ? `<div style="background: linear-gradient(135deg, #5C1A1B 0%, #8B2A2B 50%, #2D0A0A 100%); border-bottom: 3px solid #FFD700; padding: 20px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4);"><div style="font-size: 9px; letter-spacing: 3px; color: #FFD700;">⚽ পরবর্তী ম্যাচ - বাংলাদেশ মান সময়</div><div style="font-size: clamp(14px, 4vw, 20px); font-weight: bold; color: #FFD700; margin-top: 5px;">${nextMatchFlagged}</div><div style="font-size: 10px; color: #FFD700; margin-bottom: 12px;">${formatDateHeader(nextMatch.date)} · ${timeObjNext.hour}:${timeObjNext.minute} ${timeObjNext.ampm} বিএসটি · 📍 ${nextMatch.venue}</div><div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">${[["দিন", cd.d], ["ঘণ্টা", cd.h], ["মিনিট", cd.m], ["সেকেন্ড", cd.s]].map(([lbl, val]) => `<div style="background: rgba(0,0,0,0.5); border: 1px solid #FFD700; border-radius: 12px; padding: 8px 12px; min-width: 60px; text-align: center;"><div style="font-size: 22px; font-weight: bold; color: #FFD700; line-height: 1;">${pad(val)}</div><div style="font-size: 8px; color: #FFD700;">${lbl}</div></div>`).join('')}</div></div>` : `<div style="background: linear-gradient(135deg, #5C1A1B 0%, #8B2A2B 50%, #2D0A0A 100%); border-bottom: 3px solid #FFD700; padding: 20px; text-align: center; color: #FFD700; font-size: 18px;">🏆 প্রতিযোগিতা সমাপ্ত!</div>`;
    
    const fullHtml = `<div style="min-height: 100vh;">${countdownHtml}<div style="background: rgba(4,18,38,0.96); padding: 14px 16px; text-align: center; border-bottom: 1px solid rgba(197,160,40,0.15);"><div style="font-size: 8px; letter-spacing: 3px; color: #c5a028;">ফিফা বিশ্বকাপ ২০২৬ · কানাডা · মেক্সিকো · ইউএসএ</div><h1 style="font-size: clamp(16px, 5vw, 24px); margin: 4px 0; color: #fff;">🇧🇩 সম্পূর্ণ সূচি — বাংলাদেশ সময়</h1><div style="font-size: 9px; color: #2e5570;">সময় বিএসটি (ইউটিসি+৬) · ১০৪ ম্যাচ · ৪৮ দল</div><button id="toggleGroupsBtn" class="group-tag-btn" style="margin-top: 12px;">📋 ${currentState.showGroups ? "▲ গ্রুপ লুকান" : "▼ সব গ্রুপ দেখুন"}</button><div id="groupsPanel" style="margin-top: 8px;">${groupsPanelHtml}</div><input id="searchInput" class="search-input" type="text" placeholder="🔍 দল, ভেন্যু বা গ্রুপ অনুসন্ধান করুন..." value="${currentState.searchQuery.replace(/"/g, '&quot;')}" style="margin: 14px auto 12px auto; max-width: 340px;"><div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px;">${stageListEnglish.map((s, idx) => `<button data-stage="${s}" class="stage-btn ${currentState.selectedStage === s ? 'active' : ''}">${stageListBengali[idx]}</button>`).join('')}</div></div><div style="background: rgba(10,30,58,0.6); padding: 6px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; align-items: center;"><span style="font-size: 10px; font-weight: bold; color: #c5a028;">${stageListBengali[stageListEnglish.indexOf(currentState.selectedStage)]}</span><span style="font-size: 10px; color: rgba(255,255,255,0.3);">— ${stageMatches.length} ম্যাচ</span></div><div class="fixture-container">${fixturesHtml}</div><div style="border-top: 1px solid rgba(197,160,40,0.1); padding: 20px; text-align: center; font-size: 9px; color: #1e3a54;">🇧🇩 বিএসটি (ইউটিসি+৬) · অফিসিয়াল ফিফা ২০২৬ সূচি · ৪৮ দল</div></div>`;
    root.innerHTML = fullHtml;
    document.getElementById("toggleGroupsBtn")?.addEventListener("click", toggleGroups);
    document.getElementById("searchInput")?.addEventListener("input", (e) => setSearchQuery(e.target.value));
    document.querySelectorAll("[data-stage]").forEach(btn => btn.addEventListener("click", (e) => { const stage = btn.getAttribute("data-stage"); if(stage) setStage(stage); }));
  }
  
  function init() { renderApp(); intervalId = setInterval(() => { currentState.now = new Date(); renderApp(); }, 1000); }
  init();
</script>
