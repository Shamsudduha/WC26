      font-size: 12px;
      font-weight: 500;

  function parseMatchDateTime(dateStr, timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const [y, mo, d] = dateStr.split("-").map(Number);
    return new Date(Date.UTC(y, mo-1, d, h-6, m));
  }

  function formatCountdown(ms) {
    if (ms <= 0) return { d:0, h:0, m:0, s:0 };
    const totalSec = Math.floor(ms / 1000);
    return {
      d: Math.floor(totalSec / 86400),
      h: Math.floor((totalSec % 86400) / 3600),
      m: Math.floor((totalSec % 3600) / 60),
      s: totalSec % 60
    };
  }

  function pad(n) { return String(n).padStart(2, "0"); }
  
  function formatTime12(timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const hour12 = h % 12 || 12;
    const ampm = h >= 12 ? "PM" : "AM";
    return { hour: hour12, minute: pad(m), ampm: ampm };
  }
  
  function formatDateHeader(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }).toUpperCase();
  }

  function getNextMatch(fixturesWithDT) {
    const future = fixturesWithDT.filter(f => f.dt > currentState.now).sort((a,b) => a.dt - b.dt);
    return future[0] || null;
  }

  function renderApp() {
    const root = document.getElementById("root");
    if (!root) return;
    
    const enriched = fixturesRaw.map(f => ({ ...f, dt: parseMatchDateTime(f.date, f.time) }));
    const nextMatch = getNextMatch(enriched);
    const cd = nextMatch ? formatCountdown(nextMatch.dt - currentState.now) : null;

    let stageMatches = fixturesRaw.filter(f => f.stage === currentState.selectedStage);
    const searchLow = currentState.searchQuery.toLowerCase();
    
    if (searchLow) {
      stageMatches = stageMatches.filter(f => 
        (f.match || "").toLowerCase().includes(searchLow) ||
        (f.venue || "").toLowerCase().includes(searchLow) ||
        (f.group || "").toLowerCase().includes(searchLow)
      );
    }

    const byDate = {};
    stageMatches.forEach(f => { 
      byDate[f.date] = byDate[f.date] || []; 
      byDate[f.date].push(f); 
    });

    let groupsPanelHtml = "";
    if (currentState.showGroups) {
      groupsPanelHtml = `<div class="groups-grid">${Object.entries(groupsList).map(([g, teams]) => `
        <div class="group-card" style="border-left: 3px solid ${groupColors[g]};">
          <div style="font-size: 12px; font-weight: bold; color: ${groupColors[g]}; margin-bottom: 6px;">GROUP ${g}</div>
          ${teams.map(team => `<div class="group-team">${getFlag(team)} ${team}</div>`).join('')}
        </div>
      `).join('')}</div>`;
    }

    let fixturesHtml = "";
    if (Object.keys(byDate).length === 0) {
      fixturesHtml = `<div style="text-align:center; color:#2a4a6a; padding:40px 0;">🚫 No matches found${searchLow ? ` for "${currentState.searchQuery}"` : ""}.</div>`;
    } else {
      fixturesHtml = Object.entries(byDate).map(([date, matches]) => {
        const dateHeader = formatDateHeader(date);
        const matchesHtml = matches.map(m => {
          const mDT = parseMatchDateTime(m.date, m.time);
          const isPast = mDT < currentState.now;
          const isNextFlag = nextMatch && nextMatch.match === m.match && nextMatch.date === m.date && nextMatch.time === m.time;
          const groupCol = m.group ? groupColors[m.group] : (isNextFlag ? "#c5a028" : "#2a4a6a");
          const matchWithFlags = m.match.includes(" vs ") ? addFlagsToMatch(m.match) : m.match;
          const timeObj = formatTime12(m.time);
          
          return `
            <div style="background: ${isNextFlag ? 'rgba(197,160,40,0.12)' : isPast ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.04)'}; border-left: 3px solid ${groupCol}; border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
              ${isNextFlag ? `<div style="position: absolute; top: -9px; right: 10px; background: #c5a028; color: #041226; font-size: 8px; font-weight: bold; padding: 2px 12px; border-radius: 40px;">NEXT</div>` : ''}
              <div class="time-badge">
                <div><span class="time-hour">${timeObj.hour}:${timeObj.minute}</span><span class="time-ampm">${timeObj.ampm}</span></div>
                <div class="time-label">BST</div>
              </div>
              ${m.group ? `<div style="width: 30px; height: 30px; border-radius: 50%; background: ${groupColors[m.group]}; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #fff;">${m.group}</div>` : `<div style="width: 30px;"></div>`}
              <div style="flex: 1; min-width: 150px;">
                <div style="font-size: 14px; font-weight: 600; color: ${isPast ? '#809cb0' : '#fdf6e3'}; line-height: 1.4;">${matchWithFlags}</div>
                <div style="font-size: 10px; color: #6f8faa; margin-top: 5px;">📍 ${m.venue}</div>
              </div>
              ${isPast ? `<span style="font-size: 9px; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 25px;">FT</span>` : ''}
            </div>
          `;
        }).join('');
        
        return `
          <div style="margin-bottom: 28px;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
              <div style="background: linear-gradient(135deg, #c5a028, #e6cf6e); color: #041226; font-weight: bold; font-size: 10px; padding: 4px 16px; border-radius: 40px;">${dateHeader}</div>
              <div style="flex: 1; height: 1px; background: radial-gradient(circle, rgba(197,160,40,0.4), transparent);"></div>
            </div>
            ${matchesHtml}
          </div>
        `;
      }).join('');
    }

    const nextMatchFlagged = nextMatch ? (nextMatch.match.includes(" vs ") ? addFlagsToMatch(nextMatch.match) : nextMatch.match) : "";
    
    const countdownHtml = nextMatch ? `
      <div style="background: linear-gradient(135deg, #5C1A1B 0%, #8B2A2B 50%, #2D0A0A 100%); border-bottom: 3px solid #FFD700; padding: 20px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
        <div style="font-size: 9px; letter-spacing: 3px; color: #FFD700;">⚽ NEXT MATCH - BANGLADESH STANDARD TIME</div>
        <div style="font-size: clamp(14px, 4vw, 20px); font-weight: bold; color: #FFD700; margin-top: 5px;">${nextMatchFlagged}</div>
        <div style="font-size: 10px; color: #FFD700; margin-bottom: 12px;">${formatDateHeader(nextMatch.date)} · ${formatTime12(nextMatch.time).hour}:${formatTime12(nextMatch.time).minute} ${formatTime12(nextMatch.time).ampm} BST · 📍 ${nextMatch.venue}</div>
        <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
          ${[["DAYS", cd.d], ["HRS", cd.h], ["MIN", cd.m], ["SEC", cd.s]].map(([lbl, val]) => `
            <div style="background: rgba(0,0,0,0.5); border: 1px solid #FFD700; border-radius: 12px; padding: 8px 12px; min-width: 60px; text-align: center;">
              <div style="font-size: 22px; font-weight: bold; color: #FFD700; line-height: 1;">${pad(val)}</div>
              <div style="font-size: 8px; color: #FFD700;">${lbl}</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : `<div style="background: linear-gradient(135deg, #5C1A1B 0%, #8B2A2B 50%, #2D0A0A 100%); border-bottom: 3px solid #FFD700; padding: 20px; text-align: center; color: #FFD700; font-size: 18px;">🏆 Tournament Complete!</div>`;

    const fullHtml = `
      <div style="min-height: 100vh;">
        ${countdownHtml}
        <div style="background: rgba(4,18,38,0.96); padding: 14px 16px; text-align: center; border-bottom: 1px solid rgba(197,160,40,0.15);">
          <div style="font-size: 8px; letter-spacing: 3px; color: #c5a028;">FIFA WORLD CUP 2026 · CANADA · MEXICO · USA</div>
          <h1 style="font-size: clamp(16px, 5vw, 24px); margin: 4px 0; color: #fff;">🇧🇩 Full Fixture — Bangladesh Time</h1>
          <div style="font-size: 9px; color: #2e5570;">ALL TIMES BST (UTC+6) · 104 MATCHES · 48 TEAMS</div>
          <button id="toggleGroupsBtn" class="group-tag-btn" style="margin-top: 12px;">📋 ${currentState.showGroups ? "▲ Hide Groups" : "▼ Show All Groups"}</button>
          <div id="groupsPanel" style="margin-top: 8px;">${groupsPanelHtml}</div>
          <input id="searchInput" class="search-input" type="text" placeholder="🔍 Search team, venue or group…" value="${currentState.searchQuery.replace(/"/g, '&quot;')}" style="margin: 14px auto 12px auto; max-width: 340px;">
          <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px;">
            ${stageList.map(s => `<button data-stage="${s}" class="stage-btn ${currentState.selectedStage === s ? 'active' : ''}">${s}</button>`).join('')}
          </div>
        </div>
        <div style="background: rgba(10,30,58,0.6); padding: 6px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; align-items: center;">
          <span style="font-size: 10px; font-weight: bold; color: #c5a028;">${currentState.selectedStage}</span>
          <span style="font-size: 10px; color: rgba(255,255,255,0.3);">— ${stageMatches.length} matches</span>
        </div>
        <div class="fixture-container">${fixturesHtml}</div>
        <div style="border-top: 1px solid rgba(197,160,40,0.1); padding: 20px; text-align: center; font-size: 9px; color: #1e3a54;">🇧🇩 BST (UTC+6) · Official FIFA 2026 Schedule · Real flag images · 48 teams</div>
      </div>
    `;
    
    root.innerHTML = fullHtml;
    
    document.getElementById("toggleGroupsBtn")?.addEventListener("click", toggleGroups);
    const searchEl = document.getElementById("searchInput");
    if (searchEl) searchEl.addEventListener("input", (e) => setSearchQuery(e.target.value));
    document.querySelectorAll("[data-stage]").forEach(btn => {
      btn.addEventListener("click", (e) => { 
        const stage = btn.getAttribute("data-stage"); 
        if(stage) setStage(stage); 
      });
    });
  }

  function init() { 
    renderApp(); 
    intervalId = setInterval(() => { 
      currentState.now = new Date(); 
      renderApp(); 
    }, 1000);
  }
  
  init();
</script>
</body>
</html>
